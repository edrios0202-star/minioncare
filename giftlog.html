const today0 = () => { const d = new Date(); d.setHours(0, 0, 0, 0); return d; };

const fileToThumb = (file, max = 600) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, max / Math.max(img.width, img.height));
      const w = Math.max(1, Math.round(img.width * scale)), h = Math.max(1, Math.round(img.height * scale));
      const c = document.createElement("canvas"); c.width = w; c.height = h;
      try { c.getContext("2d").drawImage(img, 0, 0, w, h); resolve(c.toDataURL("image/jpeg", 0.82)); }
      catch (e) { resolve(reader.result); }
    };
    img.onerror = reject; img.src = reader.result;
  };
  reader.onerror = reject; reader.readAsDataURL(file);
});

const parsePrep = (s) => {
  if (!s) return 0;
  const m = String(s).match(/(\d+(?:\.\d+)?)\s*(day|days|week|weeks|wk|wks|month|months|mo)/i);
  if (!m) return 0;
  const n = parseFloat(m[1]); const u = m[2].toLowerCase();
  if (u.startsWith("w")) return n * 7;
  if (u.startsWith("mo") || u.startsWith("month")) return n * 30;
  return n;
};

const nextOccurrence = (dateStr, recur) => {
  if (!dateStr) return null;
  const [y, m, d] = dateStr.split("-").map(Number);
  if (!m || !d) return null;
  const now = today0();
  if (recur) { let c = new Date(now.getFullYear(), m - 1, d); if (c < now) c = new Date(now.getFullYear() + 1, m - 1, d); return c; }
  const c = new Date(y, m - 1, d); return c >= now ? c : null;
};
const daysUntil = (date) => Math.round((date - today0()) / 86400000);
const pad2 = (n) => String(n).padStart(2, "0");
const gcal = (dateStr, title, recur) => {
  if (!dateStr) return "";
  const [y, m, d] = dateStr.split("-").map(Number);
  if (!m || !d) return "";
  let startY = y;
  if (recur) { const n = today0(); let c = new Date(n.getFullYear(), m - 1, d); if (c < n) c = new Date(n.getFullYear() + 1, m - 1, d); startY = c.getFullYear(); }
  const s = `${startY}${pad2(m)}${pad2(d)}`;
  const ed = new Date(startY, m - 1, d + 1);
  const e = `${ed.getFullYear()}${pad2(ed.getMonth() + 1)}${pad2(ed.getDate())}`;
  let url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${s}/${e}`;
  if (recur) url += "&recur=" + encodeURIComponent("RRULE:FREQ=YEARLY");
  return url;
};

  const [loaded, setLoaded] = useState(false);

  const [restoreMsg, setRestoreMsg] = useState("");
  const [user, setUser] = useState(null);

  const authed = !!user && ALLOW.includes((user.email || "").toLowerCase());

  const signIn = () => { const p = new firebase.auth.GoogleAuthProvider(); firebase.auth().signInWithPopup(p).catch(() => { try { firebase.auth().signInWithRedirect(p); } catch (e) {} }); };
  const signOut = () => { try { firebase.auth().signOut(); } catch (e) {} };

  useEffect(() => {
    const unsub = firebase.auth().onAuthStateChanged((u) => { setUser(u); setAuthReady(true); });
    return () => unsub();
  }, []);

  useEffect(() => {
    if (!authed) { setLoaded(false); return; }
    const ref = stateRef();
    const cb = ref.on("value", (snap) => {
      const v = snap.val() || {};
      const ppl = v.people || SEED_PEOPLE, gfs = v.gifts || [], wrp = v.wraps || [], crd = v.cards || [], stg = v.settings || { leadWeeks: 3 };
      remoteRef.current = JSON.stringify({ people: ppl, gifts: gfs, wraps: wrp, cards: crd, settings: stg });
      setPeople(ppl); setGifts(gfs); setWraps(wrp); setCards(crd); setSettings(stg);
      setLoaded(true);
    }, (err) => { console.error(err); setLoaded(true); });
    return () => ref.off("value", cb);
  }, [authed]);

  useEffect(() => {
    if (!loaded || !authed) return;
    const bundle = { people, gifts, wraps, cards, settings };
    const j = JSON.stringify(bundle);
    if (j === remoteRef.current) return;
    remoteRef.current = j;
    stateRef().set(bundle);
  }, [people, gifts, wraps, cards, settings, loaded, authed]);

  const upcoming = useMemo(() => {
    const out = [];
    people.forEach((p) => (p.dates || []).forEach((dt) => {
      const next = nextOccurrence(dt.date, dt.recur);
      if (next) out.push({ personId: p.id, personName: p.name, label: dt.label || "Occasion", next, days: daysUntil(next) });

    return out.sort((a, b) => a.days - b.days).slice(0, 6);
  }, [people]);

  const open = (id) => { setOpenId(id); };
  const exportXlsx = () => {
    try {
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(people.map((p) => ({ Name: p.name, Relationship: p.relationship, Sizes: p.sizes, Interests: p.interests, Avoid: p.avoid, Notes: p.notes, Dates: (p.dates || []).map((d) => `${d.label}: ${d.date}${d.recur ? " (yearly)" : ""}`).join("; ") }))), "People");
      const nameOf = (id) => people.find((p) => p.id === id)?.name || "Unassigned";
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(gifts.map((g) => ({ Person: nameOf(g.personId), Item: g.item, Occasion: g.occasion, Status: g.status, Price: Number(g.price) || "", "Prep time": g.prep, Favorite: g.fav ? "★" : "", Link: g.link, Notes: g.notes }))), "Gifts");
      const out = XLSX.write(wb, { bookType: "xlsx", type: "array" });
      const url = URL.createObjectURL(new Blob([out], { type: "application/octet-stream" }));
      const a = document.createElement("a"); a.href = url; a.download = "gift-log.xlsx"; document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1500);
    } catch (e) { console.error(e); }
  };
  const backup = () => {
    const data = { _app: "GiftLog", _v: 2, people, gifts, wraps, settings };
    const url = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type: "application/json" }));
    const a = document.createElement("a"); a.href = url; a.download = "gift-log-backup.json"; document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1500);
  };
  const restore = (file) => {
    const r = new FileReader();
    r.onload = () => { try { const d = JSON.parse(r.result); if (Array.isArray(d.people)) setPeople(d.people); if (Array.isArray(d.gifts)) setGifts(d.gifts); if (Array.isArray(d.wraps)) setWraps(d.wraps); if (d.settings) setSettings(d.settings); setRestoreMsg("Restored."); } catch { setRestoreMsg("Couldn't read that file."); } };
    r.onerror = () => setRestoreMsg("Couldn't read that file."); r.readAsText(file);
  };

  const styleTag = (
    <style>{`
      @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Figtree:wght@400;500;600&display=swap');
      :root{ --bg:#F4F7F3; --card:#FFFFFF; --card2:#EAF0EA; --ink:#26302A; --muted:#6E7A70; --line:#DCE5DD;
        --burgundy:#A23E55; --burgundy-soft:rgba(162,62,85,.12); --mint:#1F8F6E; --mint-soft:#E3F1EB;
        --silver:#566B5E; --silver-soft:rgba(86,107,94,.18); --silver-dim:#7C8A80; }
      .gl *{box-sizing:border-box;}
      .gl{background:var(--bg);color:var(--ink);font-family:'Figtree',sans-serif;min-height:100vh;}
      .disp{font-family:'Quicksand',sans-serif;}
      .gl input,.gl select,.gl textarea{font-family:inherit;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:10px 12px;color:var(--ink);width:100%;font-size:15px;outline:none;}
      .gl input:focus,.gl select:focus,.gl textarea:focus{border-color:var(--mint);}
      .gl select{appearance:none;}
      .gl label{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px;}
      .card{background:var(--card);border:1px solid var(--silver-soft);border-radius:18px;}
      .btn{font-family:inherit;border-radius:11px;padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--silver-soft);background:var(--card);color:var(--ink);}
      .btn-accent{background:var(--burgundy);color:#fff;border-color:var(--burgundy);}
      .chip{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--silver-soft);}
      .tabbtn{flex:1;border:none;background:none;font-family:'Quicksand',sans-serif;font-size:13.5px;font-weight:600;padding:13px 4px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;}
      .tabbtn.on{color:var(--ink);border-bottom-color:var(--burgundy);}
      .fade{animation:f .3s ease;} @keyframes f{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
    `}</style>
  );

  const scr = (inner) => <div className="gl" style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", padding: 24 }}>{styleTag}{inner}</div>;
  if (!authReady) return scr(<span className="disp" style={{ color: "var(--muted)" }}>Loading…</span>);
  if (!user) return scr(
    <div style={{ textAlign: "center", maxWidth: 320 }}>
      <GiftLogo size={52} />
      <div className="disp" style={{ fontSize: 25, fontWeight: 700, color: "var(--silver)", margin: "12px 0 6px" }}>Gift Log</div>
      <div style={{ color: "var(--muted)", fontSize: 13.5, marginBottom: 22 }}>Private. Sign in to continue.</div>
      <button className="btn btn-accent" onClick={signIn} style={{ fontSize: 14, padding: "10px 18px" }}>Sign in with Google</button>
    </div>
  );
  if (!authed) return scr(
    <div style={{ textAlign: "center", maxWidth: 340 }}>
      <div className="disp" style={{ fontSize: 20, fontWeight: 700, marginBottom: 8 }}>Not your account</div>
      <div style={{ color: "var(--muted)", fontSize: 13.5, marginBottom: 18 }}>{user.email} doesn't have access here. Sign in with your own Google account.</div>
      <button className="btn" onClick={signOut}>Sign out</button>
    </div>
  );
  if (!loaded) return scr(<span className="disp" style={{ color: "var(--muted)" }}>Loading…</span>);

  const person = people.find((p) => p.id === openId);

  return (
    <div className="gl" style={{ paddingBottom: 60 }}>
      {styleTag}
      <div style={{ maxWidth: 720, margin: "0 auto", padding: "0 18px" }}>
        <header style={{ paddingTop: 26, paddingBottom: 16, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 11 }}>
            <GiftLogo size={40} />
            <div className="disp" style={{ fontSize: 25, fontWeight: 700, color: "var(--silver)" }}>Gift Log</div>
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button className="btn" style={{ padding: "7px 12px", fontSize: 12.5 }} onClick={exportXlsx}>Export ↓</button>
            <button className="btn" style={{ padding: "7px 12px", fontSize: 12.5 }} onClick={signOut}>Sign out</button>
          </div>
        </header>

        {person ? (
          <PersonDetail person={person} setPeople={setPeople} gifts={gifts} setGifts={setGifts} onBack={() => setOpenId(null)} />
        ) : (
          <>
            <nav className="card" style={{ display: "flex", padding: "0 6px", marginBottom: 22, position: "sticky", top: 0, zIndex: 5 }}>
              {TABS.map((t) => <button key={t} className={`tabbtn ${tab === t ? "on" : ""}`} onClick={() => setTab(t)}>{t}</button>)}
            </nav>
            <div className="fade" key={tab}>
              {tab === "People" && <PeopleView people={people} setPeople={setPeople} gifts={gifts} setGifts={setGifts} upcoming={upcoming} settings={settings} setSettings={setSettings} onOpen={open} backup={backup} restore={restore} restoreMsg={restoreMsg} />}
              {tab === "Occasions" && <OccasionsView gifts={gifts} people={people} onOpen={open} />}
              {tab === "Cards" && <CardsView cards={cards} setCards={setCards} people={people} />}

            </div>
          </>
        )}

  );
}

const Empty = ({ text }) => <div style={{ fontSize: 14, color: "var(--muted)", padding: "8px 0" }}>{text}</div>;
const toneColor = (t) => t === "urgent" ? "var(--burgundy)" : t === "good" ? "var(--mint)" : t === "mid" ? "#2F8C70" : "var(--muted)";

function readiness(personId, gifts, days, lead) {
  const mine = gifts.filter((g) => g.personId === personId && g.status !== "given");
  if (mine.some((g) => g.status === "wrapped")) return { text: "wrapped & ready", tone: "good" };
  if (mine.some((g) => g.status === "bought")) return { text: "bought · needs wrapping", tone: "mid" };
  if (mine.length === 0) return { text: "no ideas yet", tone: days <= lead ? "urgent" : "muted" };
  const prep = Math.max(0, ...mine.map((g) => parsePrep(g.prep)));
  if (prep > 0 && days - prep <= 5) return { text: `needs ~${Math.round(prep)}d to make — start now`, tone: "urgent" };
  if (days <= lead) return { text: "still choosing", tone: "urgent" };
  return { text: `${mine.length} idea${mine.length === 1 ? "" : "s"} saved`, tone: "muted" };
}

// ---------- People view ----------
function PeopleView({ people, setPeople, gifts, setGifts, upcoming, settings, setSettings, onOpen, backup, restore, restoreMsg }) {
  const [capItem, setCapItem] = useState("");
  const [capPerson, setCapPerson] = useState(people[0]?.id || "");
  const [q, setQ] = useState("");
  const [favOnly, setFavOnly] = useState(false);
  const [editGift, setEditGift] = useState(null);
  const [newPerson, setNewPerson] = useState("");
  const lead = (settings.leadWeeks || 0) * 7;

  const addPerson = () => { const p = { id: uid("pp"), name: "New person", relationship: "", sizes: "", interests: "", avoid: "", notes: "", dates: [] }; setPeople((x) => [...x, p]); onOpen(p.id); };
  const addPersonQuick = () => { const t = newPerson.trim(); if (!t) return; setPeople((x) => [...x, { id: uid("pp"), name: t, relationship: "", sizes: "", interests: "", avoid: "", notes: "", dates: [] }]); setNewPerson(""); };
  const importVcf = (file) => {
    const r = new FileReader();
    r.onload = () => {
      const txt = String(r.result || "").replace(/\r/g, "");
      const get = (re) => { const m = txt.match(re); return m ? m[1].trim() : ""; };
      let name = get(/(?:^|\n)FN[^:\n]*:(.+)/i);
      if (!name) { const nm = get(/(?:^|\n)N[^:\n]*:(.+)/i); if (nm) { const parts = nm.split(";"); name = `${parts[1] || ""} ${parts[0] || ""}`.trim(); } }
      name = (name || "New contact").replace(/\\,/g, ",").trim();
      const bday = get(/(?:^|\n)BDAY[^:\n]*:([0-9T:\-]+)/i);
      const dates = [];
      const digits = bday.replace(/[^0-9]/g, "");
      if (digits.length >= 8) dates.push({ id: uid("d"), label: "Birthday", date: `${digits.slice(0, 4)}-${digits.slice(4, 6)}-${digits.slice(6, 8)}`, recur: true });
      const p = { id: uid("pp"), name, relationship: "", sizes: "", interests: "", avoid: "", notes: "", dates };
      setPeople((x) => [...x, p]); onOpen(p.id);
    };
    r.readAsText(file);
  };
  const quickAdd = () => { const t = capItem.trim(); if (!t) return; setGifts((g) => [{ id: uid("g"), personId: capPerson, item: t, occasion: "", price: "", link: "", notes: "", prep: "", status: "idea", fav: false, image: "", givenYear: null }, ...g]); setCapItem(""); };
  const ideaCount = (pid) => gifts.filter((g) => g.personId === pid && g.status !== "given").length;
  const nextFor = (pid) => upcoming.find((u) => u.personId === pid);
  const nameOf = (id) => people.find((p) => p.id === id)?.name || "Unassigned";
  const unassigned = gifts.filter((g) => !people.some((p) => p.id === g.personId));
  const assign = (gid, pid) => setGifts((x) => x.map((g) => g.id === gid ? { ...g, personId: pid } : g));
  const commitGift = (g) => { const gg = g.status === "given" && !g.givenYear ? { ...g, givenYear: new Date().getFullYear() } : g; setGifts((x) => x.some((y) => y.id === gg.id) ? x.map((y) => y.id === gg.id ? gg : y) : [gg, ...x]); setEditGift(null); };
  const rmGift = (id) => { setGifts((x) => x.filter((y) => y.id !== id)); setEditGift(null); };

  const searching = q.trim() !== "" || favOnly;
  const results = gifts.filter((g) => {
    if (favOnly && !g.fav) return false;
    if (!q.trim()) return favOnly;
    const hay = `${g.item} ${g.occasion} ${g.notes} ${nameOf(g.personId)}`.toLowerCase();
    return hay.includes(q.trim().toLowerCase());
  });

  return (
    <div style={{ display: "grid", gap: 16 }}>
      <div className="card" style={{ padding: 18 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <div className="disp" style={{ fontSize: 13, fontWeight: 600, letterSpacing: ".04em", textTransform: "uppercase", color: "var(--silver-dim)" }}>Coming up</div>
          <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: "var(--muted)" }}>
            nudge <input type="number" value={settings.leadWeeks} onChange={(e) => setSettings({ ...settings, leadWeeks: Math.max(0, Number(e.target.value) || 0) })} style={{ width: 46, padding: "5px 7px", fontSize: 12.5, textAlign: "center" }} /> wks
          </div>
        </div>
        {upcoming.length === 0 && <Empty text="Add key dates to people and they'll show up here." />}
        <div style={{ display: "grid", gap: 12 }}>
          {upcoming.map((u, i) => {
            const r = readiness(u.personId, gifts, u.days, lead);
            return (
              <button key={i} onClick={() => onOpen(u.personId)} style={{ border: "none", background: "none", cursor: "pointer", textAlign: "left", display: "flex", alignItems: "center", justifyContent: "space-between", padding: 0 }}>
                <div>
                  <div style={{ fontSize: 15, fontWeight: 600 }}>{u.personName}<span style={{ color: "var(--muted)", fontWeight: 400 }}> · {u.label}</span></div>
                  <div style={{ fontSize: 12, color: "var(--muted)", marginTop: 2 }}>{u.days === 0 ? "today" : `in ${u.days} day${u.days === 1 ? "" : "s"}`} · <span style={{ color: toneColor(r.tone), fontWeight: 600 }}>{r.text}</span></div>
                </div>
                <span className="disp" style={{ fontSize: 13, color: "var(--silver)", fontWeight: 600 }}>{u.next.toLocaleDateString("en-US", { month: "short", day: "numeric" })}</span>
              </button>
            );
          })}
        </div>
      </div>

      <div className="card" style={{ padding: 14, display: "flex", gap: 8, alignItems: "center" }}>
        <input value={capItem} onChange={(e) => setCapItem(e.target.value)} onKeyDown={(e) => e.key === "Enter" && quickAdd()} placeholder="Quick idea…" style={{ flex: 1, border: "none", background: "none" }} />
        <select value={capPerson} onChange={(e) => setCapPerson(e.target.value)} style={{ width: "auto", background: "var(--card2)", border: "none", padding: "9px 10px", fontSize: 13 }}>
          <option value="">Unassigned</option>
          {people.map((p) => <option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
        <button className="btn btn-accent" style={{ padding: "9px 14px" }} onClick={quickAdd}>+</button>
      </div>

      <div style={{ display: "flex", gap: 8 }}>
        <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search gifts & people…" style={{ flex: 1 }} />
        <button className="btn" style={favOnly ? { borderColor: "var(--burgundy)", color: "var(--burgundy)" } : {}} onClick={() => setFavOnly((v) => !v)}>★</button>
      </div>

      {searching ? (
        <div style={{ display: "grid", gap: 10 }}>
          {results.length === 0 && <Empty text="No matches." />}
          {results.map((g) => (
            <button key={g.id} onClick={() => g.personId ? onOpen(g.personId) : setEditGift(g)} className="card" style={{ textAlign: "left", cursor: "pointer", padding: 13, display: "flex", alignItems: "center", gap: 11 }}>
              {g.image ? <img src={g.image} alt="" style={{ width: 40, height: 40, borderRadius: 8, objectFit: "cover", flexShrink: 0 }} /> : <span style={{ width: 9, height: 9, borderRadius: "50%", background: STATUS[g.status].dot, flexShrink: 0 }} />}
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 14.5, fontWeight: 600 }}>{g.fav ? "★ " : ""}{g.item}</div>
                <div style={{ fontSize: 12, color: "var(--muted)" }}>{nameOf(g.personId)}{g.occasion ? ` · ${g.occasion}` : ""} · {STATUS[g.status].label}</div>
              </div>
            </button>
          ))}
        </div>
      ) : (
        <>
          <div style={{ display: "grid", gap: 12 }}>
            {people.map((p) => {
              const n = nextFor(p.id); const ic = ideaCount(p.id);
              return (
                <button key={p.id} className="card" onClick={() => onOpen(p.id)} style={{ textAlign: "left", cursor: "pointer", padding: 16, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12 }}>
                  <div>
                    <div className="disp" style={{ fontSize: 18, fontWeight: 600 }}>{p.name}</div>
                    <div style={{ fontSize: 12.5, color: "var(--muted)", marginTop: 2 }}>{p.relationship || "—"}{n ? ` · ${n.label} in ${n.days}d` : ""}</div>
                  </div>
                  <span className="chip">{ic} idea{ic === 1 ? "" : "s"}</span>
                </button>
              );
            })}
          </div>
          <div className="card" style={{ padding: 14, display: "grid", gap: 10 }}>
            <div style={{ display: "flex", gap: 8 }}>
              <input value={newPerson} onChange={(e) => setNewPerson(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addPersonQuick()} placeholder="Add a person by name…" style={{ flex: 1 }} />
              <button className="btn btn-accent" style={{ padding: "9px 16px" }} onClick={addPersonQuick}>+ Add</button>
            </div>
            <label className="btn" style={{ textAlign: "center", cursor: "pointer" }}>Import from a contact card (.vcf)
              <input type="file" accept=".vcf,text/vcard" style={{ display: "none" }} onChange={(e) => { const f = e.target.files && e.target.files[0]; if (f) importVcf(f); e.target.value = ""; }} />
            </label>
            <div style={{ fontSize: 11.5, color: "var(--muted)", textAlign: "center" }}>On iPhone: open the contact → Share Contact → Save to Files, then pick it here. It'll grab their name and birthday.</div>
          </div>

          {unassigned.length > 0 && (
            <div>
              <div className="disp" style={{ fontSize: 12, fontWeight: 600, letterSpacing: ".04em", textTransform: "uppercase", color: "var(--silver-dim)", margin: "4px 0 10px" }}>Unassigned ideas</div>
              <div style={{ display: "grid", gap: 10 }}>
                {unassigned.map((g) => (
                  <div key={g.id} className="card" style={{ padding: 13, display: "flex", alignItems: "center", gap: 9 }}>
                    {g.image && <img src={g.image} alt="" style={{ width: 38, height: 38, borderRadius: 8, objectFit: "cover", flexShrink: 0 }} />}
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 14.5, fontWeight: 600, cursor: "pointer" }} onClick={() => setEditGift(g)}>{g.item}</div>
                      <div style={{ fontSize: 12, color: "var(--muted)" }}>tap to edit details</div>
                    </div>
                    <select value="" onChange={(e) => e.target.value && assign(g.id, e.target.value)} style={{ width: "auto", background: "var(--card2)", border: "none", padding: "8px 9px", fontSize: 12.5 }}>
                      <option value="">assign…</option>
                      {people.map((p) => <option key={p.id} value={p.id}>{p.name}</option>)}
                    </select>
                  </div>
                ))}
              </div>
            </div>
          )}
        </>
      )}

      <div className="card" style={{ padding: 18 }}>
        <div className="disp" style={{ fontSize: 12, fontWeight: 600, letterSpacing: ".04em", textTransform: "uppercase", color: "var(--silver-dim)", marginBottom: 10 }}>Backup</div>
        <div style={{ display: "flex", gap: 8 }}>
          <button className="btn" style={{ flex: 1 }} onClick={backup}>Back up ↓</button>
          <label className="btn" style={{ flex: 1, textAlign: "center", cursor: "pointer" }}>Restore ↑<input type="file" accept="application/json,.json" style={{ display: "none" }} onChange={(e) => { const f = e.target.files && e.target.files[0]; if (f) restore(f); e.target.value = ""; }} /></label>
        </div>
        {restoreMsg && <div style={{ fontSize: 12.5, color: "var(--muted)", marginTop: 8 }}>{restoreMsg}</div>}
      </div>

      {editGift && <GiftForm gift={editGift} onSave={commitGift} onCancel={() => setEditGift(null)} onDelete={rmGift} isNew={!gifts.some((y) => y.id === editGift.id)} />}
    </div>
  );
}

// ---------- Occasions view ----------
function OccasionsView({ gifts, people, onOpen }) {
  const nameOf = (id) => people.find((p) => p.id === id)?.name || "Unassigned";
  const groups = useMemo(() => {
    const m = {};
    gifts.forEach((g) => { const k = (g.occasion || "").trim() || "No occasion"; (m[k] = m[k] || []).push(g); });
    return Object.entries(m).sort((a, b) => a[0] === "No occasion" ? 1 : b[0] === "No occasion" ? -1 : a[0].localeCompare(b[0]));
  }, [gifts]);

  return (
    <div style={{ display: "grid", gap: 16 }}>
      {groups.length === 0 && <Empty text="Tag gifts with an occasion (Birthday, Christmas…) and they'll group here." />}
      {groups.map(([occ, list]) => {
        const done = list.filter((g) => g.status === "given" || g.status === "wrapped").length;
        return (
          <div key={occ} className="card" style={{ padding: 18 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 12 }}>
              <div className="disp" style={{ fontSize: 18, fontWeight: 700 }}>{occ}</div>
              <span className="chip">{done}/{list.length} ready</span>
            </div>
            <div style={{ display: "grid", gap: 9 }}>
              {list.map((g) => (
                <button key={g.id} onClick={() => g.personId && onOpen(g.personId)} style={{ border: "none", background: "none", cursor: g.personId ? "pointer" : "default", textAlign: "left", display: "flex", alignItems: "center", gap: 10, padding: "4px 0" }}>
                  {g.image ? <img src={g.image} alt="" style={{ width: 34, height: 34, borderRadius: 7, objectFit: "cover", flexShrink: 0 }} /> : <span style={{ width: 8, height: 8, borderRadius: "50%", background: STATUS[g.status].dot, flexShrink: 0 }} />}
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 14, fontWeight: 600 }}>{g.fav ? "★ " : ""}{g.item}</div>
                    <div style={{ fontSize: 11.5, color: "var(--muted)" }}>{nameOf(g.personId)}</div>
                  </div>
                  <span style={{ fontSize: 11, color: "var(--muted)" }}>{STATUS[g.status].label}</span>
                </button>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ---------- Wrapping view ----------
function CardsView({ cards, setCards, people }) {
  const [title, setTitle] = useState("");
  const add = () => { const t = title.trim(); if (!t) return; setCards((x) => [{ id: uid("c"), title: t, forName: "", occasion: "", status: "planned", notes: "", image: "" }, ...x]); setTitle(""); };
  const set = (id, patch) => setCards((x) => x.map((c) => c.id === id ? { ...c, ...patch } : c));
  const rm = (id) => setCards((x) => x.filter((c) => c.id !== id));
  const cycle = (c) => set(c.id, { status: CARD_ORDER[(CARD_ORDER.indexOf(c.status) + 1) % 3] });
  const setPhoto = async (id, file) => { try { const d = await fileToThumb(file, 600); set(id, { image: d }); } catch (e) { console.error(e); } };
  return (
    <div style={{ display: "grid", gap: 14 }}>
      <div className="card" style={{ padding: 14, display: "flex", gap: 8, alignItems: "center" }}>
        <input value={title} onChange={(e) => setTitle(e.target.value)} onKeyDown={(e) => e.key === "Enter" && add()} placeholder="New card — e.g. Birthday card for Mom" style={{ flex: 1 }} />
        <button className="btn btn-accent" style={{ padding: "9px 16px" }} onClick={add}>+ Add</button>
      </div>
      {cards.length === 0 && <Empty text="No cards yet. Track the handmade cards you're making here." />}
      {cards.map((c) => {
        const st = CARD_STATUS[c.status] || CARD_STATUS.planned;
        return (
          <div key={c.id} className="card" style={{ padding: 16, display: "grid", gap: 12 }}>
            <div style={{ display: "flex", gap: 11, alignItems: "flex-start" }}>
              {c.image
                ? <img src={c.image} alt="" style={{ width: 54, height: 54, borderRadius: 10, objectFit: "cover", flexShrink: 0 }} />
                : <div style={{ width: 54, height: 54, borderRadius: 10, background: "var(--card2)", flexShrink: 0 }} />}
              <div style={{ flex: 1, minWidth: 0, display: "grid", gap: 8 }}>
                <input value={c.title} onChange={(e) => set(c.id, { title: e.target.value })} placeholder="Card" style={{ fontWeight: 600 }} />
                <div style={{ display: "flex", gap: 8 }}>
                  <select value={c.forName} onChange={(e) => set(c.id, { forName: e.target.value })} style={{ flex: 1 }}>
                    <option value="">For… (optional)</option>
                    {people.map((p) => <option key={p.id} value={p.name}>{p.name}</option>)}
                  </select>
                  <input value={c.occasion} onChange={(e) => set(c.id, { occasion: e.target.value })} placeholder="Occasion" style={{ flex: 1 }} />
                </div>
              </div>
            </div>
            <textarea rows={2} value={c.notes} onChange={(e) => set(c.id, { notes: e.target.value })} placeholder="Design ideas, materials, colors…" />
            <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
              <button onClick={() => cycle(c)} className="chip" style={{ cursor: "pointer", border: "none" }}><span style={{ width: 7, height: 7, borderRadius: "50%", background: st.dot }} />{st.label}</button>
              <label className="chip" style={{ cursor: "pointer" }}>{c.image ? "Replace photo" : "Add photo"}<input type="file" accept="image/*" style={{ display: "none" }} onChange={(e) => { const f = e.target.files && e.target.files[0]; if (f) setPhoto(c.id, f); e.target.value = ""; }} /></label>
              {c.image && <button onClick={() => set(c.id, { image: "" })} className="chip" style={{ cursor: "pointer", border: "none" }}>remove photo</button>}
              <button onClick={() => rm(c.id)} className="chip" style={{ cursor: "pointer", border: "none", color: "var(--burgundy)" }}>delete</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function WrappingView({ wraps, setWraps }) {
  const addImg = async (file) => { try { const d = await fileToThumb(file, 700); setWraps((x) => [{ id: uid("w"), image: d, note: "" }, ...x]); } catch (e) { console.error(e); } };
  const setNote = (id, note) => setWraps((x) => x.map((w) => w.id === id ? { ...w, note } : w));
  const rm = (id) => setWraps((x) => x.filter((w) => w.id !== id));

  return (
    <div style={{ display: "grid", gap: 16 }}>
      <div style={{ fontSize: 13, color: "var(--muted)" }}>A little gallery of wrapping inspiration — load pictures you want to recreate.</div>
      <label className="btn btn-accent" style={{ textAlign: "center", cursor: "pointer" }}>+ Add inspo photo<input type="file" accept="image/*" style={{ display: "none" }} onChange={(e) => { const f = e.target.files && e.target.files[0]; if (f) addImg(f); e.target.value = ""; }} /></label>
      {wraps.length === 0 && <Empty text="No wrapping ideas saved yet." />}
      <div style={{ display: "grid", gap: 14, gridTemplateColumns: "1fr 1fr" }}>
        {wraps.map((w) => (
          <div key={w.id} className="card" style={{ overflow: "hidden", display: "flex", flexDirection: "column" }}>
            <div style={{ position: "relative" }}>
              <img src={w.image} alt="" style={{ width: "100%", display: "block", aspectRatio: "1", objectFit: "cover" }} />
              <button onClick={() => rm(w.id)} style={{ position: "absolute", top: 6, right: 6, width: 24, height: 24, borderRadius: "50%", border: "none", background: "rgba(44,50,47,.6)", color: "#fff", cursor: "pointer", fontSize: 14 }}>×</button>
            </div>
            <input value={w.note} onChange={(e) => setNote(w.id, e.target.value)} placeholder="note…" style={{ border: "none", borderRadius: 0, fontSize: 13, padding: "9px 12px" }} />
          </div>
        ))}
      </div>
    </div>
  );
}

// ---------- Person detail ----------
function PersonDetail({ person, setPeople, gifts, setGifts, onBack }) {
  const [editGift, setEditGift] = useState(null);
  const updP = (patch) => setPeople((x) => x.map((p) => p.id === person.id ? { ...p, ...patch } : p));
  const myGifts = gifts.filter((g) => g.personId === person.id);
  const ideas = myGifts.filter((g) => g.status !== "given");
  const history = myGifts.filter((g) => g.status === "given").sort((a, b) => (b.givenYear || 0) - (a.givenYear || 0));

  const addDate = () => updP({ dates: [...(person.dates || []), { id: uid("d"), label: "Birthday", date: "", recur: true }] });
  const setDate = (id, patch) => updP({ dates: person.dates.map((d) => d.id === id ? { ...d, ...patch } : d) });
  const rmDate = (id) => updP({ dates: person.dates.filter((d) => d.id !== id) });

  const blankGift = () => ({ id: uid("g"), personId: person.id, item: "", occasion: "", price: "", link: "", notes: "", prep: "", status: "idea", fav: false, image: "", givenYear: null });
  const commitGift = (g) => { const gg = g.status === "given" && !g.givenYear ? { ...g, givenYear: new Date().getFullYear() } : g; setGifts((x) => x.some((y) => y.id === gg.id) ? x.map((y) => y.id === gg.id ? gg : y) : [gg, ...x]); setEditGift(null); };
  const rmGift = (id) => { setGifts((x) => x.filter((y) => y.id !== id)); setEditGift(null); };
  const cycleStatus = (g) => setGifts((x) => x.map((y) => { if (y.id !== g.id) return y; const ns = STATUS_ORDER[(STATUS_ORDER.indexOf(y.status) + 1) % 4]; return { ...y, status: ns, ...(ns === "given" && !y.givenYear ? { givenYear: new Date().getFullYear() } : {}) }; }));
  const toggleFav = (g) => setGifts((x) => x.map((y) => y.id === g.id ? { ...y, fav: !y.fav } : y));

  const GiftRow = (g) => {
    const st = STATUS[g.status];
    return (
      <div key={g.id} className="card" style={{ padding: 14 }}>
        <div style={{ display: "flex", alignItems: "flex-start", gap: 11 }}>
          {g.image && <img src={g.image} alt="" style={{ width: 48, height: 48, borderRadius: 9, objectFit: "cover", flexShrink: 0 }} />}
          <button onClick={() => toggleFav(g)} title="favorite" style={{ background: "none", border: "none", cursor: "pointer", fontSize: 17, color: g.fav ? "var(--burgundy)" : "var(--muted)", lineHeight: 1, paddingTop: 1 }}>{g.fav ? "★" : "☆"}</button>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 15, fontWeight: 600 }}>{g.item || "Untitled"}{usd(g.price) ? <span style={{ color: "var(--muted)", fontWeight: 400 }}> · {usd(g.price)}</span> : null}</div>
            <div style={{ fontSize: 12, color: "var(--muted)", marginTop: 2 }}>{[g.status === "given" && g.givenYear ? `Given ${g.givenYear}` : "", g.occasion, g.prep ? `${g.prep} to make` : ""].filter(Boolean).join(" · ") || "—"}</div>
            <div style={{ display: "flex", gap: 8, marginTop: 10, alignItems: "center", flexWrap: "wrap" }}>
              <button onClick={() => cycleStatus(g)} className="chip" style={{ cursor: "pointer", border: "none" }}><span style={{ width: 7, height: 7, borderRadius: "50%", background: st.dot }} />{st.label}</button>
              {g.link && <a href={g.link} target="_blank" rel="noreferrer" className="chip" style={{ color: "var(--mint)", textDecoration: "none" }}>buy ↗</a>}
              <button onClick={() => setEditGift(g)} className="chip" style={{ cursor: "pointer", border: "none" }}>edit</button>
            </div>
          </div>
        </div>
      </div>
    );
  };

  return (
    <div className="fade" style={{ display: "grid", gap: 16 }}>
      <button onClick={onBack} style={{ background: "none", border: "none", color: "var(--muted)", cursor: "pointer", fontSize: 14, justifySelf: "start", padding: 0 }}>← everyone</button>

      <div className="card" style={{ padding: 18, display: "grid", gap: 14 }}>
        <div style={{ display: "grid", gap: 14, gridTemplateColumns: "1fr 1fr" }}>
          <div><label>Name</label><input value={person.name} onChange={(e) => updP({ name: e.target.value })} /></div>
          <div><label>Relationship</label><input value={person.relationship} onChange={(e) => updP({ relationship: e.target.value })} placeholder="Brother…" /></div>
        </div>
        <div><label>Sizes</label><input value={person.sizes} onChange={(e) => updP({ sizes: e.target.value })} placeholder="shoe, clothing, ring…" /></div>
        <div><label>Interests / likes</label><input value={person.interests} onChange={(e) => updP({ interests: e.target.value })} /></div>
        <div><label>Avoid / allergies</label><input value={person.avoid} onChange={(e) => updP({ avoid: e.target.value })} /></div>
        <div><label>Notes</label><textarea rows={2} value={person.notes} onChange={(e) => updP({ notes: e.target.value })} /></div>
        <div>
          <label>Key dates</label>
          <div style={{ display: "grid", gap: 8 }}>
            {(person.dates || []).map((d) => (
              <div key={d.id} style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
                <input value={d.label} onChange={(e) => setDate(d.id, { label: e.target.value })} placeholder="Birthday" style={{ flex: "0 0 30%" }} />
                <input type="date" value={d.date} onChange={(e) => setDate(d.id, { date: e.target.value })} style={{ flex: 1 }} />
                <button onClick={() => setDate(d.id, { recur: !d.recur })} title="repeats yearly" className="chip" style={{ cursor: "pointer", border: "none", color: d.recur ? "var(--mint)" : "var(--muted)" }}>↻</button>
                {d.date && <a href={gcal(d.date, `${person.name} — ${d.label || "Date"}`, d.recur)} target="_blank" rel="noreferrer" className="chip" style={{ color: "var(--mint)", textDecoration: "none" }} title="add to Google Calendar">＋cal</a>}
                <button onClick={() => rmDate(d.id)} style={{ background: "none", border: "none", color: "var(--muted)", cursor: "pointer", fontSize: 18 }}>×</button>
              </div>
            ))}
            <button className="btn" style={{ justifySelf: "start", padding: "8px 14px" }} onClick={addDate}>+ date</button>
          </div>
        </div>
      </div>

      <div>
        <div className="disp" style={{ fontSize: 13, fontWeight: 600, letterSpacing: ".04em", textTransform: "uppercase", color: "var(--silver-dim)", margin: "4px 0 10px" }}>Gift ideas</div>
        <div style={{ display: "grid", gap: 10 }}>
          {ideas.length === 0 && <Empty text="No ideas yet — jot one down." />}
          {ideas.map(GiftRow)}
        </div>
        <button className="btn" style={{ marginTop: 12 }} onClick={() => setEditGift(blankGift())}>+ Add gift</button>
      </div>

      {history.length > 0 && (
        <div>
          <div className="disp" style={{ fontSize: 13, fontWeight: 600, letterSpacing: ".04em", textTransform: "uppercase", color: "var(--silver-dim)", margin: "4px 0 10px" }}>Given before</div>
          <div style={{ display: "grid", gap: 10 }}>{history.map(GiftRow)}</div>
        </div>
      )}

      {editGift && <GiftForm gift={editGift} onSave={commitGift} onCancel={() => setEditGift(null)} onDelete={rmGift} isNew={!gifts.some((y) => y.id === editGift.id)} />}
    </div>
  );
}

function GiftForm({ gift, onSave, onCancel, onDelete, isNew }) {
  const [f, setF] = useState(gift);
  const set = (k, v) => setF((p) => ({ ...p, [k]: v }));
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(44,50,47,.4)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 30 }} onClick={onCancel}>
      <div className="card fade" onClick={(e) => e.stopPropagation()} style={{ width: "100%", maxWidth: 560, borderBottomLeftRadius: 0, borderBottomRightRadius: 0, padding: 22, maxHeight: "90vh", overflowY: "auto" }}>
        <div className="disp" style={{ fontSize: 21, fontWeight: 700, marginBottom: 18 }}>{isNew ? "New gift" : "Edit gift"}</div>
        <div style={{ display: "grid", gap: 14 }}>
          <div><label>Gift</label><input value={f.item} onChange={(e) => set("item", e.target.value)} placeholder="What is it?" /></div>
          <div>
            <label>Photo</label>
            {f.image && <img src={f.image} alt="" style={{ width: "100%", maxHeight: 200, objectFit: "contain", borderRadius: 10, border: "1px solid var(--line)", marginBottom: 10, background: "var(--card2)" }} />}
            <div style={{ display: "flex", gap: 8 }}>
              <label className="btn" style={{ flex: 1, textAlign: "center", cursor: "pointer" }}>{f.image ? "Replace photo" : "Add a photo"}<input type="file" accept="image/*" style={{ display: "none" }} onChange={async (e) => { const file = e.target.files && e.target.files[0]; if (file) { try { const d = await fileToThumb(file, 600); set("image", d); } catch (err) { console.error(err); } } e.target.value = ""; }} /></label>
              {f.image && <button className="btn" onClick={() => set("image", "")}>Remove</button>}
            </div>
          </div>
          <div style={{ display: "grid", gap: 14, gridTemplateColumns: "1fr 1fr" }}>
            <div><label>Occasion</label><input value={f.occasion} onChange={(e) => set("occasion", e.target.value)} placeholder="Birthday…" /></div>
            <div><label>Price</label><input type="number" value={f.price} onChange={(e) => set("price", e.target.value)} placeholder="$" /></div>
          </div>
          <div style={{ display: "grid", gap: 14, gridTemplateColumns: "1fr 1fr" }}>
            <div><label>Status</label><select value={f.status} onChange={(e) => set("status", e.target.value)}>{STATUS_ORDER.map((s) => <option key={s} value={s}>{STATUS[s].label}</option>)}</select></div>
            <div><label>Time to put together</label><input value={f.prep} onChange={(e) => set("prep", e.target.value)} placeholder="e.g. 2 weeks" /></div>
          </div>
          <div><label>Link (where to buy)</label><input value={f.link} onChange={(e) => set("link", e.target.value)} placeholder="paste a link" /></div>
          <div><label>Notes</label><textarea rows={2} value={f.notes} onChange={(e) => set("notes", e.target.value)} /></div>
          <label style={{ display: "flex", alignItems: "center", gap: 9, textTransform: "none", letterSpacing: 0, fontSize: 14, color: "var(--ink)", cursor: "pointer" }}>
            <button type="button" onClick={() => set("fav", !f.fav)} style={{ width: 22, height: 22, borderRadius: 7, border: "2px solid var(--burgundy)", background: f.fav ? "var(--burgundy)" : "transparent", color: "#fff", cursor: "pointer", fontSize: 12 }}>{f.fav ? "★" : ""}</button>
            This is the one
          </label>
        </div>
        <div style={{ display: "flex", gap: 10, marginTop: 20 }}>
          <button className="btn btn-accent" style={{ flex: 1 }} onClick={() => onSave(f)}>Save</button>
          <button className="btn" onClick={onCancel}>Cancel</button>
          {!isNew && <button className="btn" style={{ color: "var(--burgundy)" }} onClick={() => onDelete(f.id)}>Delete</button>}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(GiftLog));

</script>
</body></html>
