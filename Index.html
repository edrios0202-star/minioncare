// ---------- storage (shared via Firebase) ----------
const STATE_PATH = "minioncare/state";
const stateRef = () => firebase.database().ref(STATE_PATH);
const ALLOW = ["erikadrios@gmail.com", "drios0325@gmail.com", "drey772@gmail.com", "erikarios.arias@gmail.com", "dpms1025@gmail.com"];
const uid = (p) => p + Date.now() + Math.random().toString(36).slice(2, 6);
const clone = (o) => JSON.parse(JSON.stringify(o));
const todayKey = () => new Date().toISOString().slice(0, 10);
const nowTime = () => new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
const daysBetween = (iso) => Math.round((new Date(iso + "T00:00") - new Date(new Date().toDateString())) / 86400000);

const fileToThumb = (file, max = 700) => new Promise((res, rej) => {
  const r = new FileReader();
  r.onload = () => { const i = new Image(); i.onload = () => { const s = Math.min(1, max / Math.max(i.width, i.height)); const w = Math.round(i.width * s), h = Math.round(i.height * s); const c = document.createElement("canvas"); c.width = w; c.height = h; try { c.getContext("2d").drawImage(i, 0, 0, w, h); res(c.toDataURL("image/jpeg", 0.82)); } catch (e) { res(r.result); } }; i.onerror = rej; i.src = r.result; };
  r.onerror = rej; r.readAsDataURL(file);
});

const pad = (n) => String(n).padStart(2, "0");
const gcalUrl = ({ title, date, time, details = "", location = "" }) => {
  if (!date) return null;
  let dates;
  if (time) { const s = new Date(`${date}T${time}`), e = new Date(s.getTime() + 30 * 60000); const f = (d) => `${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}T${pad(d.getHours())}${pad(d.getMinutes())}00`; dates = `${f(s)}/${f(e)}`; }
  else { const s = date.replace(/-/g, ""); const d2 = new Date(`${date}T00:00`); d2.setDate(d2.getDate() + 1); dates = `${s}/${d2.getFullYear()}${pad(d2.getMonth() + 1)}${pad(d2.getDate())}`; }
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${dates}&details=${encodeURIComponent(details)}${location ? "&location=" + encodeURIComponent(location) : ""}`;
};
const addToCal = (o) => { const u = gcalUrl(o); if (u) window.open(u, "_blank"); };

const TABS = ["Dashboard", "Pets", "Vet", "Supplies", "More"];
const ACTIVITIES = ["Walk", "Play", "Potty", "Litter"];
const SLOTS = ["AM", "PM"];
const DEFAULT = { pets: [], supplies: [], log: {} };

const { useState, useEffect, useMemo, useRef } = React;

function PetCare() {
  const [loaded, setLoaded] = useState(false);
  const [tab, setTab] = useState("Dashboard");
  const [data, setData] = useState(DEFAULT);
  const [user, setUser] = useState(null);
  const [authReady, setAuthReady] = useState(false);
  const authed = !!user && ALLOW.includes((user.email || "").toLowerCase());
  const me = user ? (user.displayName || user.email || "someone") : "someone";
  const [openPet, setOpenPet] = useState(null);
  const [toast, setToast] = useState("");
  const dataRef = useRef(data);
  const appliedRef = useRef(false);
  useEffect(() => { dataRef.current = data; }, [data]);

  const signIn = () => { const p = new firebase.auth.GoogleAuthProvider(); firebase.auth().signInWithPopup(p).catch(() => { try { firebase.auth().signInWithRedirect(p); } catch (e) {} }); };
  const signOut = () => { try { firebase.auth().signOut(); } catch (e) {} };

  useEffect(() => {
    const unsub = firebase.auth().onAuthStateChanged((u) => { setUser(u); setAuthReady(true); });
    return () => unsub();
  }, []);

  useEffect(() => {
    if (!authed) { setLoaded(false); return; }
    const ref = stateRef();
    const cb = ref.on("value", (snap) => { const v = snap.val() || {}; setData({ pets: v.pets || [], supplies: v.supplies || [], log: v.log || {} }); setLoaded(true); }, (err) => { console.error(err); setLoaded(true); });
    return () => ref.off("value", cb);
  }, [authed]);

  const update = (fn) => setData((prev) => { const next = typeof fn === "function" ? fn(clone(prev)) : fn; stateRef().set(next); return next; });

  // notify the day before a vet visit (fires when the app is open + reminders allowed)
  useEffect(() => {
    if (!loaded || typeof Notification === "undefined" || Notification.permission !== "granted") return;
    (data.pets || []).forEach((p) => (p.appts || []).forEach((a) => {
      if (a.date && daysBetween(a.date) === 1) {
        const k = `minioncare:notified:${a.id}:${todayKey()}`;
        try { if (!localStorage.getItem(k)) { new Notification(`Vet visit tomorrow — ${p.name}`, { body: [a.reason, a.time, a.location].filter(Boolean).join(" · ") }); localStorage.setItem(k, "1"); } } catch (e) {}
      }
    }));
  }, [loaded, data]);

  // NFC tag links: ?give=<pet name>&slot=AM|PM  -> log that med slot once
  useEffect(() => {
    if (!loaded || appliedRef.current) return;
    const params = new URLSearchParams(window.location.search);
    const give = params.get("give"); const slot = params.get("slot");
    if (!give || !slot) return;
    appliedRef.current = true;
    const dk = todayKey();
    const d0 = dataRef.current;
    const pet = (d0.pets || []).find((p) => (p.name || "").trim().toLowerCase() === give.trim().toLowerCase());
    if (!pet) { setToast(`No pet named "${give}" found`); }
    else {
      const key = `${pet.id}:med${slot}`;
      const already = d0.log[dk] && d0.log[dk].med && d0.log[dk].med[key];
      const affected = (pet.meds || []).filter((m) => (m.times || []).includes(slot));
      if (already) setToast(`${pet.name}'s ${slot} meds were already logged today`);
      else if (affected.length === 0) setToast(`${pet.name} has no ${slot} meds set`);
      else {
        update((d) => {
          const pp = d.pets.find((x) => x.id === pet.id);
          const day = d.log[dk] = d.log[dk] || { fed: {}, med: {} };
          (pp ? pp.meds || [] : []).filter((m) => (m.times || []).includes(slot)).forEach((m) => { m.count = Math.max(0, (Number(m.count) || 0) - 1); });
          day.med[key] = { by: me || "someone", at: nowTime(), meds: affected.map((m) => m.id) };
          return d;
        });
        setToast(`Logged ${pet.name}'s ${slot} meds ✓`);
      }
    }
    try { window.history.replaceState({}, "", window.location.pathname); } catch (e) {}
  }, [loaded]);

  useEffect(() => { if (!toast) return; const t = setTimeout(() => setToast(""), 4000); return () => clearTimeout(t); }, [toast]);

  const styleTag = (
    <style>{`
      @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&family=Nunito+Sans:wght@400;600;700&display=swap');
      :root{ --bg:#FAFAF7; --card:#FFFFFF; --card2:#F0F0EB; --ink:#1B1B1A; --muted:#8C8C86; --line:#E5E5DF; --accent:#1B1B1A; --accent-soft:#EDEDE8; --teal:#6E6E66; --teal-soft:#EAEAE4; --warn:#1B1B1A; }
      .pc *{box-sizing:border-box;}
      .pc{background-color:var(--bg);background-image:url(\"data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxOTAiIGhlaWdodD0iMTkwIiB2aWV3Qm94PSIwIDAgMTkwIDE5MCI+PGcgZmlsbD0iIzJhMmEyOCIgZmlsbC1vcGFjaXR5PSIwLjEyIj48ZWxsaXBzZSBjeD0iMzQiIGN5PSI0NCIgcng9IjE1IiByeT0iMTEiIHRyYW5zZm9ybT0icm90YXRlKDIwIDM0IDQ0KSIvPjxlbGxpcHNlIGN4PSIxMjgiIGN5PSIyOCIgcng9IjEwIiByeT0iMTQiIHRyYW5zZm9ybT0icm90YXRlKC0xNSAxMjggMjgpIi8+PGVsbGlwc2UgY3g9IjE2NSIgY3k9IjEwMCIgcng9IjEzIiByeT0iMTAiLz48ZWxsaXBzZSBjeD0iODAiIGN5PSI5NiIgcng9IjkiIHJ5PSIxMyIgdHJhbnNmb3JtPSJyb3RhdGUoMzAgODAgOTYpIi8+PGVsbGlwc2UgY3g9IjQ0IiBjeT0iMTUwIiByeD0iMTMiIHJ5PSI5IiB0cmFuc2Zvcm09InJvdGF0ZSgtMjAgNDQgMTUwKSIvPjxlbGxpcHNlIGN4PSIxMTgiIGN5PSIxNjAiIHJ4PSIxMCIgcnk9IjEzIi8+PGNpcmNsZSBjeD0iMTAwIiBjeT0iNjAiIHI9IjQiLz48Y2lyY2xlIGN4PSIyMiIgY3k9IjEwMCIgcj0iNSIvPjxjaXJjbGUgY3g9IjE1OCIgY3k9IjE2OCIgcj0iNCIvPjwvZz48L3N2Zz4=\");color:var(--ink);font-family:'Nunito Sans',sans-serif;min-height:100vh;}
      .disp{font-family:'Baloo 2',sans-serif;}
      .pc input,.pc select,.pc textarea{font-family:inherit;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:9px 11px;color:var(--ink);width:100%;font-size:15px;outline:none;}
      .pc input:focus,.pc select:focus,.pc textarea:focus{border-color:var(--accent);}
      .pc select{appearance:none;}
      .pc label{font-size:11px;letter-spacing:.03em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:4px;}
      .card{background:var(--card);border:1px solid var(--line);border-radius:18px;}
      .btn{font-family:inherit;border-radius:11px;padding:9px 15px;font-size:14px;font-weight:700;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--ink);}
      .btn-accent{background:var(--accent);color:#fff;border-color:var(--accent);}
      .btn-sm{padding:6px 11px;font-size:12.5px;border-radius:9px;}
      .chip{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:5px;background:var(--card2);}
      .tabbtn{flex:1;border:none;background:none;font-family:'Baloo 2',sans-serif;font-size:14px;font-weight:600;padding:13px 4px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;}
      .tabbtn.on{color:var(--ink);border-bottom-color:var(--accent);}
      .fade{animation:f .3s ease;} @keyframes f{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
    `}</style>
  );

  const screen = (inner) => <div className="pc" style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", padding: 24 }}>{styleTag}{inner}</div>;
  if (!authReady) return screen(<span className="disp" style={{ color: "var(--muted)" }}>Loading…</span>);
  if (!user) return screen(
    <div style={{ textAlign: "center", maxWidth: 320 }}>
      <PomLogo size={64} />
      <div className="disp" style={{ fontSize: 26, fontWeight: 700, margin: "10px 0 6px" }}>MinionCare</div>
      <div style={{ color: "var(--muted)", fontSize: 14, marginBottom: 20 }}>Sign in to see and update the family's pets.</div>
      <button className="btn btn-accent" onClick={signIn} style={{ fontSize: 15 }}>Sign in with Google</button>
    </div>
  );
  if (!authed) return screen(
    <div style={{ textAlign: "center", maxWidth: 340 }}>
      <div className="disp" style={{ fontSize: 20, fontWeight: 700, marginBottom: 8 }}>Not on the list</div>
      <div style={{ color: "var(--muted)", fontSize: 14, marginBottom: 18 }}>{user.email} isn't on the family access list. Sign in with an approved account, or ask Erika to add this address.</div>
      <button className="btn" onClick={signOut}>Sign out</button>
    </div>
  );
  if (!loaded) return screen(<span className="disp" style={{ color: "var(--muted)" }}>Loading…</span>);

  const pet = data.pets.find((p) => p.id === openPet);

  return (
    <div className="pc" style={{ paddingBottom: 60 }}>
      {styleTag}
      {toast && <div style={{ position: "fixed", top: 14, left: "50%", transform: "translateX(-50%)", background: "var(--ink)", color: "var(--bg)", padding: "10px 16px", borderRadius: 12, fontSize: 13.5, fontWeight: 700, zIndex: 50, boxShadow: "0 6px 20px rgba(0,0,0,.18)", maxWidth: "90%", textAlign: "center" }}>{toast}</div>}
      <div style={{ maxWidth: 720, margin: "0 auto", padding: "0 18px" }}>
        <header style={{ paddingTop: 24, paddingBottom: 14, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <PomLogo size={40} />
            <div className="disp" style={{ fontSize: 25, fontWeight: 700 }}>MinionCare</div>
          </div>
          <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 2 }}>
            <span style={{ fontSize: 12.5, fontWeight: 700 }}>{me}</span>
            <button onClick={signOut} style={{ background: "none", border: "none", color: "var(--muted)", fontSize: 11, cursor: "pointer", padding: 0, textDecoration: "underline" }}>Sign out</button>
          </div>
        </header>

        {pet ? (
          <PetDetail pet={pet} update={update} me={me} onBack={() => setOpenPet(null)} />
        ) : (
          <>
            <nav className="card" style={{ display: "flex", padding: "0 6px", marginBottom: 20, position: "sticky", top: 0, zIndex: 5 }}>
              {TABS.map((t) => <button key={t} className={`tabbtn ${tab === t ? "on" : ""}`} onClick={() => setTab(t)}>{t}</button>)}
            </nav>
            <div className="fade" key={tab}>
              {tab === "Dashboard" && <DashboardView data={data} update={update} me={me} onOpen={setOpenPet} />}
              {tab === "Pets" && <PetsView data={data} update={update} onOpen={setOpenPet} />}
              {tab === "Vet" && <VetVisitsView data={data} update={update} />}
              {tab === "Supplies" && <SuppliesView data={data} update={update} />}
              {tab === "More" && <MoreView data={data} setData={setData} update={update} me={me} />}
            </div>
          </>
        )}
      </div>
    </div>
  );

function PomLogo({ size = 40 }) {
  return <img src={POM_SRC} alt="" aria-hidden="true" style={{ height: size, width: "auto", display: "block" }} />;
}

const Empty = ({ text }) => <div style={{ fontSize: 14, color: "var(--muted)", padding: "10px 0" }}>{text}</div>;
const speciesColor = (s) => s === "cat" ? "var(--teal)" : "var(--accent)";

function Section({ title, count, children, open, onToggle }) {
  return (
    <div className="card" style={{ padding: 0, overflow: "hidden" }}>
      <button onClick={onToggle} style={{ width: "100%", background: "none", border: "none", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", padding: "15px 16px", color: "var(--ink)" }}>
        <span className="disp" style={{ fontSize: 16, fontWeight: 600 }}>{title}{count != null ? ` (${count})` : ""}</span>
        <span style={{ color: "var(--muted)" }}>{open ? "▲" : "▼"}</span>
      </button>
      {open && <div style={{ padding: "0 16px 16px" }}>{children}</div>}
    </div>
  );
}

// ---------- Today ----------
function DashboardView({ data, update, me, onOpen }) {
  const dk = todayKey();
  const log = data.log[dk] || { fed: {}, med: {} };
  const stamp = () => ({ by: me || "someone", at: nowTime() });
  const toggleFeed = (petId, slot) => update((d) => { const day = d.log[dk] = d.log[dk] || { fed: {}, med: {} }; const k = `${petId}:${slot}`; if (day.fed[k]) delete day.fed[k]; else day.fed[k] = stamp(); return d; });
  const toggleMedSlot = (petId, slot) => update((d) => {
    const day = d.log[dk] = d.log[dk] || { fed: {}, med: {} };
    const k = `${petId}:med${slot}`;
    const pet = d.pets.find((p) => p.id === petId);
    const affected = (pet ? pet.meds || [] : []).filter((m) => (m.times || []).includes(slot));
    if (day.med[k]) { (day.med[k].meds || []).forEach((id) => { const m = pet && pet.meds.find((x) => x.id === id); if (m) m.count = (Number(m.count) || 0) + 1; }); delete day.med[k]; }
    else { affected.forEach((m) => { m.count = Math.max(0, (Number(m.count) || 0) - 1); }); day.med[k] = Object.assign(stamp(), { meds: affected.map((m) => m.id) }); }
    return d;
  });

  const apptsToday = []; const lowMeds = []; const dueVax = []; const upcoming = [];
  data.pets.forEach((p) => {
    (p.meds || []).forEach((m) => { if ((Number(m.count) || 0) <= (Number(m.refillAt) || 0)) lowMeds.push({ pet: p, m }); });
    (p.appts || []).forEach((a) => { if (a.date === dk) apptsToday.push({ pet: p, a }); else if (a.date && daysBetween(a.date) >= 0 && daysBetween(a.date) <= 30) upcoming.push({ pet: p, label: a.reason, date: a.date, d: daysBetween(a.date) }); });
    (p.vaccines || []).forEach((v) => { if (v.due && daysBetween(v.due) <= 30) dueVax.push({ pet: p, v, d: daysBetween(v.due) }); });
  });
  upcoming.sort((a, b) => a.d - b.d);
  const lowSupplies = (data.supplies || []).filter((s) => s.low);
  const orders = (data.supplies || []).filter((s) => s.restock).map((s) => ({ s, d: daysBetween(s.restock) })).filter((o) => o.d <= 7).sort((a, b) => a.d - b.d);
  const vBlank = { petId: "", reason: "", date: "", time: "", location: "" };
  const [vAdd, setVAdd] = useState(false);
  const [vDraft, setVDraft] = useState(vBlank);
  const saveVisit = () => { if (!vDraft.petId || !vDraft.date) return; update((d) => { const p = d.pets.find((x) => x.id === vDraft.petId); if (p) p.appts = [...(p.appts || []), { id: uid("a"), reason: vDraft.reason, date: vDraft.date, time: vDraft.time, location: vDraft.location, reminder: "" }]; return d; }); setVDraft(vBlank); setVAdd(false); };
  const visits = [];
  data.pets.forEach((p) => (p.appts || []).forEach((a) => { if (a.date && daysBetween(a.date) >= 0) visits.push({ pet: p, a, d: daysBetween(a.date) }); }));
  visits.sort((x, y) => x.d - y.d);

  const HCELL = { fontSize: 10, fontWeight: 700, letterSpacing: ".02em", textTransform: "uppercase", color: "var(--muted)", textAlign: "center", padding: "2px 2px 8px" };
  const CELL = { display: "flex", justifyContent: "center", alignItems: "center", padding: "10px 2px", borderTop: "1px solid var(--line)" };

  return (
    <div style={{ display: "grid", gap: 16 }}>
      <div className="disp" style={{ fontSize: 20, fontWeight: 700 }}>{new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" })}</div>

      {data.pets.length === 0 ? <Empty text="Add your pets first (Pets tab) and they'll show up here every day." /> : (
        <div className="card" style={{ padding: "12px 12px 4px" }}>
          <div style={{ display: "grid", gridTemplateColumns: "1.5fr repeat(4, 1fr)", alignItems: "center" }}>
            <div style={HCELL} />
            <div style={HCELL}>B'fast</div>
            <div style={HCELL}>Dinner</div>
            <div style={HCELL}>Med AM</div>
            <div style={HCELL}>Med PM</div>
            {data.pets.map((p) => {
              const hasAM = (p.meds || []).some((m) => (m.times || []).includes("AM"));
              const hasPM = (p.meds || []).some((m) => (m.times || []).includes("PM"));
              const bf = log.fed[`${p.id}:breakfast`]; const dn = log.fed[`${p.id}:dinner`];
              const ma = log.med[`${p.id}:medAM`]; const mp = log.med[`${p.id}:medPM`];
              const feedAmts = (p.feeding || []).filter((f) => f.amount).map((f) => `${f.label} ${f.amount}`).join(" · ");
              return (
                <React.Fragment key={p.id}>
                  <button onClick={() => onOpen(p.id)} style={{ display: "flex", alignItems: "center", gap: 7, background: "none", border: "none", borderTop: "1px solid var(--line)", cursor: "pointer", textAlign: "left", padding: "10px 4px 10px 0" }}>
                    {p.photo ? <img src={p.photo} alt="" style={{ width: 26, height: 26, borderRadius: 7, objectFit: "cover", flexShrink: 0 }} /> : <div style={{ width: 26, height: 26, borderRadius: 7, background: "var(--card2)", flexShrink: 0 }} />}
                    <div style={{ minWidth: 0 }}>
                      <span className="disp" style={{ fontSize: 13.5, fontWeight: 700, lineHeight: 1.15, display: "block" }}>{p.name}</span>
                      {feedAmts && <span style={{ fontSize: 10, color: "var(--muted)", display: "block", lineHeight: 1.25 }}>{feedAmts}</span>}
                    </div>
                  </button>
                  <div style={CELL}><Check done={!!bf} onToggle={() => toggleFeed(p.id, "breakfast")} title={bf ? `${bf.by} · ${bf.at}` : "tap = fed"} /></div>
                  <div style={CELL}><Check done={!!dn} onToggle={() => toggleFeed(p.id, "dinner")} title={dn ? `${dn.by} · ${dn.at}` : "tap = fed"} /></div>
                  <div style={CELL}>{hasAM ? <Check done={!!ma} onToggle={() => toggleMedSlot(p.id, "AM")} title={ma ? `${ma.by} · ${ma.at}` : "tap = given"} /> : <span style={{ color: "var(--muted)", fontSize: 11, fontWeight: 700 }}>N/A</span>}</div>
                  <div style={CELL}>{hasPM ? <Check done={!!mp} onToggle={() => toggleMedSlot(p.id, "PM")} title={mp ? `${mp.by} · ${mp.at}` : "tap = given"} /> : <span style={{ color: "var(--muted)", fontSize: 11, fontWeight: 700 }}>N/A</span>}</div>
                </React.Fragment>
              );
            })}
          </div>
          <div style={{ fontSize: 11, color: "var(--muted)", padding: "10px 2px 6px" }}>Tap a box to mark it done — it logs who and when (tap again to undo). Long-press a box to see who logged it. Tap a pet's name for full details.</div>
        </div>
      )}

      {data.pets.length > 0 && (
        <div className="card" style={{ padding: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div className="disp" style={{ fontSize: 16, fontWeight: 600 }}>Vet visits</div>
            <button className="btn btn-sm" onClick={() => setVAdd(!vAdd)}>{vAdd ? "Cancel" : "+ Add"}</button>
          </div>
          {vAdd && (
            <div style={{ display: "grid", gap: 8, marginBottom: 14, paddingBottom: 14, borderBottom: "1px solid var(--line)" }}>
              <select value={vDraft.petId} onChange={(e) => setVDraft({ ...vDraft, petId: e.target.value })}><option value="">Which pet?</option>{data.pets.map((p) => <option key={p.id} value={p.id}>{p.name}</option>)}</select>
              <input value={vDraft.reason} onChange={(e) => setVDraft({ ...vDraft, reason: e.target.value })} placeholder="Purpose (checkup, dental…)" />
              <div style={{ display: "flex", gap: 8 }}>
                <input type="date" value={vDraft.date} onChange={(e) => setVDraft({ ...vDraft, date: e.target.value })} />
                <input type="time" value={vDraft.time} onChange={(e) => setVDraft({ ...vDraft, time: e.target.value })} style={{ flex: "0 0 38%" }} />
              </div>
              <input value={vDraft.location} onChange={(e) => setVDraft({ ...vDraft, location: e.target.value })} placeholder="Location" />
              <button className="btn btn-accent btn-sm" style={{ justifySelf: "start", opacity: (!vDraft.petId || !vDraft.date) ? 0.5 : 1 }} onClick={saveVisit}>Save visit</button>
            </div>
          )}
          {visits.length === 0 ? <Empty text="No upcoming visits. Tap + Add to log one." /> : (
            <div style={{ display: "grid", gap: 10 }}>
              {visits.map(({ pet, a, d }, i) => (
                <div key={"vv" + i} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 14, fontWeight: 600 }}>{pet.name} — {a.reason || "Vet visit"}</div>
                    <div style={{ fontSize: 11.5, color: d <= 1 ? "var(--ink)" : "var(--muted)" }}>{[new Date(a.date + "T00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" }), a.time, a.location].filter(Boolean).join(" · ")}{d === 0 ? " · today" : d === 1 ? " · tomorrow" : ` · in ${d}d`}</div>
                  </div>
                  <button className="btn btn-sm" onClick={() => addToCal({ title: `${pet.name}: ${a.reason || "Vet visit"}`, date: a.date, time: a.time, location: a.location || "", details: [a.reminder, "From MinionCare"].filter(Boolean).join(" — ") })}>cal</button>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {(lowSupplies.length > 0 || lowMeds.length > 0 || dueVax.length > 0 || orders.length > 0) && (
        <div className="card" style={{ padding: 16 }}>
          <div className="disp" style={{ fontSize: 16, fontWeight: 600, marginBottom: 10 }}>Heads up</div>
          <div style={{ display: "grid", gap: 8, fontSize: 13.5 }}>
            {orders.map(({ s, d }, i) => <div key={"or" + i} style={{ color: d < 0 ? "var(--warn)" : "var(--ink)" }}>{s.item} order {d < 0 ? `${-d}d overdue` : d === 0 ? "arrives today" : `arrives in ${d}d`}</div>)}
            {dueVax.map(({ pet, v, d }, i) => <div key={"vx" + i} style={{ color: d < 0 ? "var(--warn)" : "var(--ink)" }}>{pet.name} — {v.name} vaccine {d < 0 ? `overdue` : d === 0 ? "due today" : `due in ${d}d`}</div>)}
            {lowMeds.map(({ pet, m }, i) => <div key={"lm" + i} style={{ color: "var(--warn)" }}>Refill {pet.name}'s {m.name} ({m.count} {m.form || "left"})</div>)}
            {lowSupplies.map((s, i) => <div key={"ls" + i} style={{ color: "var(--warn)" }}>Restock {s.item}</div>)}
          </div>
        </div>
      )}
    </div>
  );
}

function Check({ done, onToggle, title }) {
  return <button title={title} onClick={onToggle} style={{ width: 26, height: 26, borderRadius: 7, border: "2px solid var(--accent)", background: done ? "var(--accent)" : "transparent", color: "#fff", cursor: "pointer", fontSize: 13, lineHeight: 1, padding: 0 }}>{done ? "✓" : ""}</button>;
}

// ---------- Pets list ----------
function PetsView({ data, update, onOpen }) {
  const [bulk, setBulk] = useState(false);
  const mkPet = (name, species) => ({ id: uid("pet"), name, species, breed: "", birthday: "", photo: "", vet: "", microchip: "", notes: "", foodBrand: "", foodNotes: "", feeding: [], meds: [], grooming: [], vaccines: [], appts: [], weights: [], journal: [], activity: [], photos: [] });
  const addPet = (name, species) => { const p = mkPet(name, species); update((d) => { d.pets.push(p); return d; }); if (!bulk) onOpen(p.id); };
  const quickStart = () => update((d) => { for (let i = 1; i <= 7; i++) d.pets.push(mkPet(`Dog ${i}`, "dog")); for (let i = 1; i <= 3; i++) d.pets.push(mkPet(`Cat ${i}`, "cat")); return d; });
  const setPet = (id, patch) => update((d) => { const p = d.pets.find((x) => x.id === id); if (p) Object.assign(p, patch); return d; });
  const rmPet = (id) => update((d) => { d.pets = d.pets.filter((x) => x.id !== id); return d; });
  const addMed = (petId) => update((d) => { const p = d.pets.find((x) => x.id === petId); if (p) p.meds = [...(p.meds || []), { id: uid("med"), name: "", dose: "", form: "pills", count: "", refillAt: "", times: [] }]; return d; });
  const setMed = (petId, medId, patch) => update((d) => { const p = d.pets.find((x) => x.id === petId); if (p) p.meds = (p.meds || []).map((m) => m.id === medId ? { ...m, ...patch } : m); return d; });
  const rmMed = (petId, medId) => update((d) => { const p = d.pets.find((x) => x.id === petId); if (p) p.meds = (p.meds || []).filter((m) => m.id !== medId); return d; });
  const toggleMedTime = (petId, medId, slot) => update((d) => { const p = d.pets.find((x) => x.id === petId); if (!p) return d; p.meds = (p.meds || []).map((m) => { if (m.id !== medId) return m; const times = (m.times || []).includes(slot) ? m.times.filter((t) => t !== slot) : [...(m.times || []), slot]; return { ...m, times }; }); return d; });
  const chip = (on) => ({ padding: "6px 10px", fontSize: 12, fontWeight: 700, borderRadius: 8, border: "1px solid var(--accent)", background: on ? "var(--accent)" : "transparent", color: on ? "#fff" : "var(--accent)", cursor: "pointer", flexShrink: 0 });

  const TH = { fontSize: 10.5, fontWeight: 700, letterSpacing: ".03em", textTransform: "uppercase", color: "var(--muted)", textAlign: "left", padding: "6px 8px", whiteSpace: "nowrap" };
  const TD = { padding: "5px 6px", borderTop: "1px solid var(--line)", verticalAlign: "middle" };
  const CIN = { padding: "7px 8px", fontSize: 13.5 };

  return (
    <div style={{ display: "grid", gap: 12 }}>
      {data.pets.length === 0 && (
        <div className="card" style={{ padding: 20, textAlign: "center" }}>
          <Empty text="No pets yet. Add them one by one, or start the whole crew at once." />
          <button className="btn btn-accent" style={{ marginTop: 8 }} onClick={quickStart}>Quick-add 7 dogs &amp; 3 cats</button>
        </div>
      )}

      {data.pets.length > 0 && (
        <div style={{ display: "flex", justifyContent: "flex-end" }}>
          <button className="btn btn-sm" onClick={() => setBulk(!bulk)}>{bulk ? "Done — card view" : "Quick-edit table"}</button>
        </div>
      )}

      {bulk ? (
        <>
        <div className="card" style={{ padding: 12, overflowX: "auto" }}>
          <table style={{ borderCollapse: "collapse", width: "100%", minWidth: 780 }}>
            <thead>
              <tr><th style={TH}>Name</th><th style={TH}>Type</th><th style={TH}>Breed</th><th style={TH}>Birthday</th><th style={TH}>Food brand</th><th style={TH}>Food notes</th><th style={TH}></th></tr>
            </thead>
            <tbody>
              {data.pets.map((p) => (
                <tr key={p.id}>
                  <td style={{ ...TD, minWidth: 110 }}><input value={p.name} onChange={(e) => setPet(p.id, { name: e.target.value })} style={CIN} /></td>
                  <td style={{ ...TD, width: 84 }}><select value={p.species} onChange={(e) => setPet(p.id, { species: e.target.value })} style={CIN}><option value="dog">Dog</option><option value="cat">Cat</option></select></td>
                  <td style={{ ...TD, minWidth: 120 }}><input value={p.breed} onChange={(e) => setPet(p.id, { breed: e.target.value })} style={CIN} /></td>
                  <td style={{ ...TD, width: 150 }}><input type="date" value={p.birthday} onChange={(e) => setPet(p.id, { birthday: e.target.value })} style={CIN} /></td>
                  <td style={{ ...TD, minWidth: 140 }}><input value={p.foodBrand || ""} onChange={(e) => setPet(p.id, { foodBrand: e.target.value })} style={CIN} /></td>
                  <td style={{ ...TD, minWidth: 160 }}><input value={p.foodNotes || ""} onChange={(e) => setPet(p.id, { foodNotes: e.target.value })} style={CIN} placeholder="portions, mix-ins…" /></td>
                  <td style={TD}><button onClick={() => rmPet(p.id)} style={{ background: "none", border: "none", color: "var(--muted)", cursor: "pointer", fontSize: 17 }}>×</button></td>
                </tr>
              ))}
            </tbody>
          </table>
          <div style={{ fontSize: 11, color: "var(--muted)", padding: "10px 4px 2px" }}>Edits save and sync as you type. Vaccines, vet visits and photos live in each pet's full record (card view).</div>
          <button className="btn btn-sm" style={{ marginTop: 8 }} onClick={() => addPet("New pet", "dog")}>+ Add pet</button>
        </div>

        {data.pets.length > 0 && (
          <div className="card" style={{ padding: 16 }}>
            <div className="disp" style={{ fontSize: 15, fontWeight: 700, marginBottom: 4 }}>Medications</div>
            <div style={{ fontSize: 11, color: "var(--muted)", marginBottom: 12 }}>Quick-add per pet. Tap AM / PM for when it's given. The quantity feeds the dashboard checkmarks and refill alerts.</div>
            <div style={{ display: "grid", gap: 12 }}>
              {data.pets.map((p) => (
                <div key={p.id} style={{ borderTop: "1px solid var(--line)", paddingTop: 10 }}>
                  <div style={{ fontWeight: 700, fontSize: 13.5, marginBottom: 6 }}>{p.name}</div>
                  <div style={{ display: "grid", gap: 6 }}>
                    {(p.meds || []).map((m) => (
                      <div key={m.id} style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
                        <input value={m.name} onChange={(e) => setMed(p.id, m.id, { name: e.target.value })} placeholder="med name" style={{ flex: "1 1 110px", padding: "6px 8px", fontSize: 13 }} />
                        <input type="number" value={m.count} onChange={(e) => setMed(p.id, m.id, { count: e.target.value })} placeholder="qty" style={{ width: 62, padding: "6px 8px", fontSize: 13 }} />
                        <button onClick={() => toggleMedTime(p.id, m.id, "AM")} style={chip((m.times || []).includes("AM"))}>AM</button>
                        <button onClick={() => toggleMedTime(p.id, m.id, "PM")} style={chip((m.times || []).includes("PM"))}>PM</button>
                        <button onClick={() => rmMed(p.id, m.id)} style={{ background: "none", border: "none", color: "var(--muted)", cursor: "pointer", fontSize: 16, flexShrink: 0 }}>×</button>
                      </div>
                    ))}
                    <button className="btn btn-sm" style={{ justifySelf: "start" }} onClick={() => addMed(p.id)}>+ med</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
        </>
      ) : (
        <>
          <div style={{ display: "grid", gap: 12, gridTemplateColumns: "1fr 1fr" }}>
            {data.pets.map((p) => (
              <button key={p.id} className="card" onClick={() => onOpen(p.id)} style={{ cursor: "pointer", padding: 14, textAlign: "left", display: "flex", flexDirection: "column", gap: 8 }}>
                {p.photo ? <img src={p.photo} alt="" style={{ width: "100%", aspectRatio: "1", objectFit: "cover", borderRadius: 12 }} /> : <div style={{ width: "100%", aspectRatio: "1", borderRadius: 12, background: "var(--card2)", display: "flex", alignItems: "center", justifyContent: "center" }}><PomLogo size={42} /></div>}
                <div>
                  <div className="disp" style={{ fontSize: 17, fontWeight: 600 }}>{p.name}</div>
                  <div style={{ fontSize: 12, color: speciesColor(p.species), fontWeight: 700, textTransform: "capitalize" }}>{p.species}{p.breed ? ` · ${p.breed}` : ""}</div>
                </div>
              </button>
            ))}
          </div>
          <button className="btn" onClick={() => addPet("New pet", "dog")}>+ Add pet</button>
        </>
      )}
    </div>
  );
}

// ---------- Pet detail ----------
function PetDetail({ pet, update, me, onBack }) {
  const [openSec, setOpenSec] = useState("meds");
  const toggle = (s) => setOpenSec(openSec === s ? null : s);
  const setP = (patch) => update((d) => { const p = d.pets.find((x) => x.id === pet.id); Object.assign(p, patch); return d; });
  const mutP = (fn) => update((d) => { const p = d.pets.find((x) => x.id === pet.id); fn(p); return d; });
  const rmPet = () => { if (confirm(`Remove ${pet.name}?`)) { update((d) => { d.pets = d.pets.filter((x) => x.id !== pet.id); return d; }); onBack(); } };

  const addWeight = (v) => mutP((p) => { p.weights = [...(p.weights || []), { id: uid("w"), date: todayKey(), value: Number(v) || 0 }]; });
  const latestW = (pet.weights || [])[(pet.weights || []).length - 1];

  return (
    <div className="fade" style={{ display: "grid", gap: 14 }}>
      <button onClick={onBack} style={{ background: "none", border: "none", color: "var(--muted)", cursor: "pointer", fontSize: 14, justifySelf: "start", padding: 0 }}>← all pets</button>

      <div className="card" style={{ padding: 16, display: "flex", gap: 14, alignItems: "center" }}>
        <label style={{ cursor: "pointer", flexShrink: 0 }}>
          {pet.photo ? <img src={pet.photo} alt="" style={{ width: 76, height: 76, borderRadius: 16, objectFit: "cover" }} /> : <div style={{ width: 76, height: 76, borderRadius: 16, background: "var(--card2)", display: "flex", alignItems: "center", justifyContent: "center" }}><PomLogo size={40} /></div>}
          <input type="file" accept="image/*" style={{ display: "none" }} onChange={async (e) => { const f = e.target.files && e.target.files[0]; if (f) { const d = await fileToThumb(f, 600); setP({ photo: d }); } e.target.value = ""; }} />
        </label>
        <div style={{ flex: 1 }}>
          <input value={pet.name} onChange={(e) => setP({ name: e.target.value })} className="disp" style={{ fontSize: 19, fontWeight: 700, border: "none", background: "none", padding: 0 }} />
          <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
            <select value={pet.species} onChange={(e) => setP({ species: e.target.value })} style={{ width: "auto", padding: "6px 9px", fontSize: 13 }}><option value="dog">Dog</option><option value="cat">Cat</option></select>
            <input value={pet.breed} onChange={(e) => setP({ breed: e.target.value })} placeholder="breed" style={{ fontSize: 13, padding: "6px 9px" }} />
          </div>
        </div>
      </div>

      {pet.health && <div style={{ background: "#FCEBEA", border: "1px solid #E7B6B1", color: "#C0392B", padding: "10px 14px", borderRadius: 12, fontWeight: 700, fontSize: 13.5 }}>Allergies / health: {pet.health}</div>}

      <Section title="Profile" open={openSec === "profile"} onToggle={() => toggle("profile")}>
        <div style={{ display: "grid", gap: 12 }}>
          <div style={{ display: "grid", gap: 12, gridTemplateColumns: "1fr 1fr" }}>
            <div><label>Birthday</label><input type="date" value={pet.birthday} onChange={(e) => setP({ birthday: e.target.value })} /></div>
            <div><label>Weight</label><div style={{ display: "flex", gap: 6 }}><input type="number" placeholder={latestW ? String(latestW.value) : "lbs"} onKeyDown={(e) => { if (e.key === "Enter" && e.target.value) { addWeight(e.target.value); e.target.value = ""; } }} /></div></div>
          </div>
          <div><label>Vet</label><input value={pet.vet} onChange={(e) => setP({ vet: e.target.value })} placeholder="clinic / phone" /></div>
          <div><label>Microchip</label><input value={pet.microchip} onChange={(e) => setP({ microchip: e.target.value })} /></div>
          <div><label>Notes / quirks</label><textarea rows={2} value={pet.notes} onChange={(e) => setP({ notes: e.target.value })} /></div>

        <div style={{ display: "grid", gap: 10, gridTemplateColumns: "1fr 1fr" }}>

  );

const addDays = (iso, n) => { const d = new Date(iso + "T00:00"); d.setDate(d.getDate() + n); return d.toISOString().slice(0, 10); };

function ListEditor({ items, cols, onAdd, onSet, onRm }) {
  return (
    <div style={{ display: "grid", gap: 8 }}>
      {items.length === 0 && <Empty text="Nothing yet." />}
      {items.map((it) => (
        <div key={it.id} style={{ display: "flex", gap: 8, alignItems: "center" }}>
          {cols.map((c) => <input key={c.k} value={it[c.k] || ""} onChange={(e) => onSet(it.id, { [c.k]: e.target.value })} placeholder={c.ph} style={c.flex ? { flex: c.flex } : { flex: 1 }} />)}
          <button onClick={() => onRm(it.id)} style={{ background: "none", border: "none", color: "var(--muted)", cursor: "pointer", fontSize: 17 }}>×</button>
        </div>
      ))}
      <button className="btn" style={{ justifySelf: "start" }} onClick={onAdd}>+ add</button>
    </div>
  );
}

function Spark({ data }) {
  const vals = data.map((d) => Number(d.value) || 0);
  const min = Math.min(...vals), max = Math.max(...vals), range = max - min || 1;
  const W = 300, H = 60, pad = 4;
  const x = (i) => pad + (i / (data.length - 1)) * (W - pad * 2);
  const y = (v) => H - pad - ((v - min) / range) * (H - pad * 2);
  const line = data.map((d, i) => `${i === 0 ? "M" : "L"}${x(i).toFixed(1)} ${y(Number(d.value) || 0).toFixed(1)}`).join(" ");
  return (
    <div>
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{ width: "100%", height: 56 }}>
        <path d={line} fill="none" stroke="var(--accent)" strokeWidth="2" vectorEffect="non-scaling-stroke" strokeLinejoin="round" />
      </svg>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "var(--muted)" }}><span>{data[0].value}</span><span>weight trend</span><span>{data[data.length - 1].value}</span></div>
    </div>
  );
}

// ---------- Supplies ----------
function SuppliesView({ data, update }) {
  const [item, setItem] = useState("");
  const add = () => { const t = item.trim(); if (!t) return; update((d) => { d.supplies = [{ id: uid("s"), item: t, low: true, price: "", restock: "", link: "" }, ...(d.supplies || [])]; return d; }); setItem(""); };
  const setS = (id, patch) => update((d) => { d.supplies = d.supplies.map((s) => s.id === id ? { ...s, ...patch } : s); return d; });
  const rm = (id) => update((d) => { d.supplies = d.supplies.filter((s) => s.id !== id); return d; });
  const lowMeds = []; data.pets.forEach((p) => (p.meds || []).forEach((m) => { if ((Number(m.count) || 0) <= (Number(m.refillAt) || 0)) lowMeds.push({ pet: p, m }); }));
  const supplies = data.supplies || [];
  const total = supplies.reduce((a, s) => a + (Number(s.price) || 0), 0);

  return (
    <div style={{ display: "grid", gap: 16 }}>
      <div className="card" style={{ padding: 14, display: "flex", gap: 8 }}>
        <input value={item} onChange={(e) => setItem(e.target.value)} onKeyDown={(e) => e.key === "Enter" && add()} placeholder="Add a supply…" style={{ flex: 1, border: "none", background: "none" }} />
        <button className="btn btn-accent" onClick={add}>+</button>
      </div>
      {lowMeds.length > 0 && (
        <div className="card" style={{ padding: 16 }}>
          <div className="disp" style={{ fontSize: 15, fontWeight: 600, marginBottom: 8, color: "var(--warn)" }}>Meds to refill</div>
          {lowMeds.map(({ pet, m }, i) => <div key={i} style={{ fontSize: 14, padding: "5px 0" }}>{pet.name} — {m.name} <span style={{ color: "var(--muted)" }}>({m.count} {m.form || "left"})</span></div>)}
        </div>
      )}
      <div className="card" style={{ padding: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 12 }}>
          <div className="disp" style={{ fontSize: 15, fontWeight: 600 }}>Supplies</div>
          {total > 0 && <div style={{ fontSize: 12.5, color: "var(--muted)" }}>~${total.toFixed(2)} / cycle</div>}
        </div>
        {supplies.length === 0 && <Empty text="Nothing on the list." />}
        <div style={{ display: "grid", gap: 12 }}>
          {supplies.map((s) => { const d = s.restock ? daysBetween(s.restock) : null; return (
            <div key={s.id} style={{ border: "1px solid var(--line)", borderRadius: 12, padding: 12, display: "grid", gap: 8 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <button onClick={() => setS(s.id, { low: !s.low })} style={{ width: 20, height: 20, borderRadius: 6, border: "2px solid var(--accent)", background: s.low ? "transparent" : "var(--accent)", color: "#fff", cursor: "pointer", flexShrink: 0, fontSize: 11 }}>{s.low ? "" : "✓"}</button>
                <input value={s.item} onChange={(e) => setS(s.id, { item: e.target.value })} style={{ flex: 1, border: "none", background: "none", fontSize: 15, fontWeight: 600, padding: 0, textDecoration: s.low ? "none" : "line-through", color: s.low ? "var(--ink)" : "var(--muted)" }} />
                <button onClick={() => rm(s.id)} style={{ background: "none", border: "none", color: "var(--muted)", cursor: "pointer", fontSize: 17 }}>×</button>
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <div style={{ flex: "0 0 33%" }}><label>Price</label><input value={s.price} onChange={(e) => setS(s.id, { price: e.target.value })} placeholder="$" inputMode="decimal" /></div>
                <div style={{ flex: 1 }}><label>Next order</label><input type="date" value={s.restock} onChange={(e) => setS(s.id, { restock: e.target.value })} /></div>
              </div>
              <div><label>Chewy link</label><input value={s.link} onChange={(e) => setS(s.id, { link: e.target.value })} placeholder="https://www.chewy.com/…" /></div>
              <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                {d != null && <span className="chip" style={{ background: d <= 3 ? "var(--accent-soft)" : "var(--card2)" }}>{d < 0 ? `order ${-d}d overdue` : d === 0 ? "arriving today" : `next order in ${d}d`}</span>}
                {s.link && <a className="chip" href={s.link} target="_blank" rel="noreferrer" style={{ textDecoration: "none", color: "var(--ink)", cursor: "pointer" }}>Chewy ↗</a>}
              </div>
            </div>
          ); })}
        </div>
        <div style={{ fontSize: 11.5, color: "var(--muted)", marginTop: 10 }}>Set the next-order date so the whole family knows when auto-ship is coming. Check an item off once it's restocked.</div>
      </div>
    </div>
  );
}

// ---------- Vet visits ----------
function VetVisitsView({ data, update }) {
  const blank = { petId: "", reason: "", date: "", time: "", location: "", reminder: "" };
  const [adding, setAdding] = useState(false);
  const [draft, setDraft] = useState(blank);
  const save = () => { if (!draft.petId || !draft.date) return; update((d) => { const p = d.pets.find((x) => x.id === draft.petId); if (p) p.appts = [...(p.appts || []), { id: uid("a"), reason: draft.reason, date: draft.date, time: draft.time, location: draft.location, reminder: draft.reminder }]; return d; }); setDraft(blank); setAdding(false); };
  const setVisit = (petId, id, patch) => update((d) => { const p = d.pets.find((x) => x.id === petId); if (p) p.appts = (p.appts || []).map((a) => a.id === id ? { ...a, ...patch } : a); return d; });
  const rmVisit = (petId, id) => update((d) => { const p = d.pets.find((x) => x.id === petId); if (p) p.appts = (p.appts || []).filter((a) => a.id !== id); return d; });

  const all = [];
  data.pets.forEach((p) => (p.appts || []).forEach((a) => all.push({ p, a })));
  all.sort((x, y) => (x.a.date || "9999").localeCompare(y.a.date || "9999"));

  return (
    <div style={{ display: "grid", gap: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div className="disp" style={{ fontSize: 20, fontWeight: 700 }}>Vet visits</div>
        <button className="btn btn-sm btn-accent" onClick={() => setAdding(!adding)}>{adding ? "Cancel" : "+ Add a vet visit"}</button>
      </div>

      {adding && (
        <div className="card" style={{ padding: 16, display: "grid", gap: 10 }}>
          <div><label>Pet</label><select value={draft.petId} onChange={(e) => setDraft({ ...draft, petId: e.target.value })}><option value="">Choose a pet…</option>{data.pets.map((p) => <option key={p.id} value={p.id}>{p.name}</option>)}</select></div>
          <div><label>Purpose of visit</label><input value={draft.reason} onChange={(e) => setDraft({ ...draft, reason: e.target.value })} placeholder="Annual checkup, dental, etc." /></div>
          <div style={{ display: "flex", gap: 8 }}>
            <div style={{ flex: 1 }}><label>Date</label><input type="date" value={draft.date} onChange={(e) => setDraft({ ...draft, date: e.target.value })} /></div>
            <div style={{ flex: "0 0 38%" }}><label>Time</label><input type="time" value={draft.time} onChange={(e) => setDraft({ ...draft, time: e.target.value })} /></div>
          </div>
          <div><label>Location</label><input value={draft.location} onChange={(e) => setDraft({ ...draft, location: e.target.value })} placeholder="clinic name / address" /></div>
          <div><label>Reminders / notes</label><input value={draft.reminder} onChange={(e) => setDraft({ ...draft, reminder: e.target.value })} placeholder="fast beforehand, bring records…" /></div>
          <button className="btn btn-accent" style={{ justifySelf: "start", opacity: (!draft.petId || !draft.date) ? 0.5 : 1 }} onClick={save}>Save visit</button>
        </div>
      )}

      {all.length === 0 && <Empty text="No vet visits yet. Tap + Add a vet visit to log one." />}
      {all.map(({ p, a }) => (
        <div key={a.id} className="card" style={{ padding: 14, display: "grid", gap: 10 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span className="disp" style={{ fontSize: 16, fontWeight: 700 }}>{p.name}</span>
            <button onClick={() => rmVisit(p.id, a.id)} style={{ background: "none", border: "none", color: "var(--muted)", cursor: "pointer", fontSize: 17 }}>×</button>
          </div>
          <input value={a.reason} onChange={(e) => setVisit(p.id, a.id, { reason: e.target.value })} placeholder="Purpose of visit" />
          <div style={{ display: "flex", gap: 8 }}>
            <input type="date" value={a.date} onChange={(e) => setVisit(p.id, a.id, { date: e.target.value })} />
            <input type="time" value={a.time} onChange={(e) => setVisit(p.id, a.id, { time: e.target.value })} style={{ flex: "0 0 38%" }} />
          </div>
          <input value={a.location || ""} onChange={(e) => setVisit(p.id, a.id, { location: e.target.value })} placeholder="Location" />
          <input value={a.reminder || ""} onChange={(e) => setVisit(p.id, a.id, { reminder: e.target.value })} placeholder="Reminders / notes" />
          <button className="btn btn-sm" style={{ justifySelf: "start" }} onClick={() => addToCal({ title: `${p.name}: ${a.reason || "Vet visit"}`, date: a.date, time: a.time, location: a.location || "", details: [a.reminder, "From MinionCare"].filter(Boolean).join(" — ") })}>+ Google Cal</button>
        </div>
      ))}
    </div>
  );
}

// ---------- More ----------
function MoreView({ data, setData, update, me }) {
  const [sheet, setSheet] = useState("");
  const careSheet = () => {
    let t = `MINIONCARE — CARE SHEET\n\n`;
    data.pets.forEach((p) => {
      t += `${p.name} (${p.species}${p.breed ? ", " + p.breed : ""})\n`;
      if (p.health) t += `  ** ALLERGIES / HEALTH: ${p.health} **\n`;
      if (p.foodBrand || p.foodNotes) t += `  Food: ${p.foodBrand || ""}${p.foodNotes ? " — " + p.foodNotes : ""}\n`;
      if (p.feeding && p.feeding.length) t += `  Meals: ${p.feeding.map((f) => `${f.label} ${f.time}${f.amount ? " (" + f.amount + ")" : ""}`).join(", ")}\n`;
      if (p.meds && p.meds.length) t += `  Meds: ${p.meds.map((m) => `${m.name}${m.dose ? " " + m.dose : ""}${(m.times && m.times.length) ? " (" + m.times.join(" & ") + ")" : ""}${(m.count != null && m.count !== "") ? " — " + m.count + " " + (m.form || "doses") + " left" : ""}`).join("; ")}\n`;
      if (p.grooming && p.grooming.length) t += `  Grooming: ${p.grooming.map((g) => `${g.label}${g.everyDays ? " every " + g.everyDays + "d" : ""}`).join(", ")}\n`;
      if (p.vet) t += `  Vet: ${p.vet}\n`;
      if (p.notes) t += `  Notes: ${p.notes}\n`;
      t += `\n`;
    });
    setSheet(t.trim());
  };
  const copySheet = () => { try { navigator.clipboard.writeText(sheet); } catch (e) {} };
  const exportXlsx = () => {
    try {
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data.pets.map((p) => ({ Name: p.name, Species: p.species, Breed: p.breed, Birthday: p.birthday, "Allergies/Health": p.health, "Food brand": p.foodBrand, "Food notes": p.foodNotes, Vet: p.vet, Microchip: p.microchip, Notes: p.notes }))), "Pets");
      const meds = []; data.pets.forEach((p) => (p.meds || []).forEach((m) => meds.push({ Pet: p.name, Med: m.name, Dose: m.dose, Schedule: m.schedule, Remaining: m.count, Form: m.form })));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(meds), "Meds");
      const appts = []; data.pets.forEach((p) => (p.appts || []).forEach((a) => appts.push({ Pet: p.name, Reason: a.reason, Date: a.date, Time: a.time })));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(appts), "Appointments");
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet((data.supplies || []).map((s) => ({ Item: s.item, Price: s.price, "Next order": s.restock, "Chewy link": s.link, "On list": s.low ? "yes" : "no" }))), "Supplies");
      const vax = []; data.pets.forEach((p) => (p.vaccines || []).forEach((v) => vax.push({ Pet: p.name, Vaccine: v.name, Administered: v.given, "Next due": v.due, Vet: v.vet, "Proof on file": v.proof ? "yes" : "no" })));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(vax), "Vaccines");
      const out = XLSX.write(wb, { bookType: "xlsx", type: "array" });
      const url = URL.createObjectURL(new Blob([out], { type: "application/octet-stream" }));
      const a = document.createElement("a"); a.href = url; a.download = "pet-care.xlsx"; document.body.appendChild(a); a.click(); document.body.removeChild(a); setTimeout(() => URL.revokeObjectURL(url), 1500);
    } catch (e) { console.error(e); }
  };
  const backup = () => { const url = URL.createObjectURL(new Blob([JSON.stringify({ _app: "PetCare", data }, null, 2)], { type: "application/json" })); const a = document.createElement("a"); a.href = url; a.download = "pet-care-backup.json"; document.body.appendChild(a); a.click(); document.body.removeChild(a); setTimeout(() => URL.revokeObjectURL(url), 1500); };
  const restore = (file) => { const r = new FileReader(); r.onload = () => { try { const d = JSON.parse(r.result); const nd = d.data || d; if (nd.pets) update(() => nd); } catch (e) {} }; r.readAsText(file); };

  return (
    <div style={{ display: "grid", gap: 16 }}>
      <div className="card" style={{ padding: 16 }}>
        <div className="disp" style={{ fontSize: 16, fontWeight: 600, marginBottom: 8 }}>Sharing with family</div>
        <div style={{ fontSize: 13, color: "var(--muted)" }}>Everyone on the family list signs in with their own Google account and sees the same pets, syncing in real time. Whatever you check off is automatically stamped with your name — no need to type it.</div>
      </div>

      <div className="card" style={{ padding: 16 }}>
        <div className="disp" style={{ fontSize: 16, fontWeight: 600, marginBottom: 8 }}>Vet visit reminders</div>
        <div style={{ fontSize: 13, color: "var(--muted)" }}>Turn on reminders to get a day-before nudge for vet visits while the app is open on this device. For a guaranteed alert even when the app is closed, use the "+ Google Cal" button on a visit and set its reminder to 1 day before.</div>
        <button className="btn" style={{ marginTop: 12 }} onClick={() => { try { if (typeof Notification !== "undefined") Notification.requestPermission(); } catch (e) {} }}>Turn on reminders</button>
      </div>

      <div className="card" style={{ padding: 16 }}>
        <div className="disp" style={{ fontSize: 16, fontWeight: 600, marginBottom: 8 }}>Sitter care sheet</div>
        <button className="btn btn-accent" onClick={careSheet}>Generate</button>
        {sheet && <>
          <textarea rows={10} value={sheet} readOnly style={{ marginTop: 12, fontSize: 13 }} />
          <button className="btn" style={{ marginTop: 8 }} onClick={copySheet}>Copy to clipboard</button>
        </>}
      </div>

      <div className="card" style={{ padding: 16 }}>
        <div className="disp" style={{ fontSize: 16, fontWeight: 600, marginBottom: 10 }}>Export &amp; backup</div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <button className="btn" onClick={exportXlsx}>Export Excel ↓</button>
          <button className="btn" onClick={backup}>Back up ↓</button>
          <label className="btn" style={{ cursor: "pointer" }}>Restore ↑<input type="file" accept="application/json,.json" style={{ display: "none" }} onChange={(e) => { const f = e.target.files && e.target.files[0]; if (f) restore(f); e.target.value = ""; }} /></label>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(PetCare));

</script>
